
name: Generate Snake

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: joshi-chinmay-016
          outputs: dist/snake.svg
          color_snake: "#a855f7"
          color_dots: "#161B22,#2e1065,#6b21a8,#9333ea,#c084fc"

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

